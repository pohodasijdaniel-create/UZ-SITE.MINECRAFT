<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Квитки</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 50px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
}
button {
    padding: 10px 20px;
    background: #6a5cff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Квиток</h2>

    <p id="route"></p>
    <p id="date"></p>

    <p>Поїзд №001</p>
    <p>Ціна: 300 грн</p>

    <button onclick="alert('Квиток куплено 😎')">
        Купити
    </button>
</div>

<script>
// отримуємо дані з URL
let params = new URLSearchParams(window.location.search);

let from = params.get("from");
let to = params.get("to");
let date = params.get("date");

document.getElementById("route").innerText = `${from} → ${to}`;
document.getElementById("date").innerText = `Дата: ${date}`;
</script>

</body>
</html>
