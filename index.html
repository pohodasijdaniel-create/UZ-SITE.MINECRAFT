<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UZ Booking</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

header{
    background:#005bbb;
    color:white;
    padding:20px;
    font-size:32px;
    font-weight:bold;
    text-align:center;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    color:#005bbb;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

select,input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    background:#ffd500;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ffcc00;
}

.ticket{
    margin-top:30px;
    background:#eaf4ff;
    border-left:8px solid #005bbb;
    padding:20px;
    display:none;
}

.ticket h3{
    margin-top:0;
    color:#005bbb;
}
</style>
</head>

<body>

<header>
    УЗ Booking
</header>

<div class="container">

<h2>Купівля квитка</h2>

<label>Звідки</label>
<select id="from">
    <option>Київ-Деміївський</option>
    <option>Видубичі</option>
    <option>Васильків</option>
    <option>Миронівка</option>
    <option>Одеса</option>
</select>

<label>Куди</label>
<select id="to">
    <option>Видубичі</option>
    <option>Васильків</option>
    <option>Миронівка</option>
    <option>Одеса</option>
</select>

<label>Ім'я пасажира</label>
<input type="text" id="name" placeholder="Ваше ім'я">

<label>Дата</label>
<input type="date" id="date">

<button onclick="buyTicket()">Купити квиток</button>

<div class="ticket" id="ticket">
    <h3>Ваш квиток</h3>

    <p><b>Пасажир:</b> <span id="ticketName"></span></p>
    <p><b>Маршрут:</b> <span id="ticketRoute"></span></p>
    <p><b>Дата:</b> <span id="ticketDate"></span></p>
    <p><b>Потяг:</b> Електричка EP9M</p>
    <p><b>Вагон:</b> 3</p>
    <p><b>Місце:</b> 18</p>
</div>

</div>

<script>
function buyTicket(){

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let name = document.getElementById("name").value;
    let date = document.getElementById("date").value;

    document.getElementById("ticket").style.display = "block";

    document.getElementById("ticketName").innerText = name;
    document.getElementById("ticketRoute").innerText = from + " → " + to;
    document.getElementById("ticketDate").innerText = date;
}
</script>

</body>
</html>
