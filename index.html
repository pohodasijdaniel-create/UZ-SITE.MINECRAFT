<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Пошук поїзда</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #6a5cff, #4fa3ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
}

h2 {
    text-align: center;
}

select, input, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
}

button {
    background: #6a5cff;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Пошук поїзда</h2>

    <label>Звідки:</label>
    <select id="from">
        <option>Київ-Пас</option>
    </select>

    <label>Куди:</label>
    <select id="to">
        <option>Вінниця</option>
        <option>Козятин-1</option>
        <option>Жмеринка</option>
        <option>Могилів-Подільський</option>
    </select>

    <label>Дата:</label>
    <input type="date" id="date">

    <button onclick="search()">Знайти</button>
</div>

<script>
function search() {
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let date = document.getElementById("date").value;

    if (!date) {
        alert("Вибери дату!");
        return;
    }

    // передаємо дані в URL
    window.location.href = `квитки.html?from=${from}&to=${to}&date=${date}`;
}
</script>

</body>
</html>
